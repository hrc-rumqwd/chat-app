<!-- Modal -->
<div class="modal" id="customModal" style="display:block;">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h1 class="modal-title fs-5" id="staticBackdropLabel">{{title}}</h1>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="container">
                    <ng-content></ng-content>
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal" (click)="onCloseClicked()">Close</button>
                <button type="button" class="btn btn-primary" (click)="onOkClicked()">Ok</button>
            </div>
        </div>
    </div>
</div>
<div class="modal-backdrop show"></div>
