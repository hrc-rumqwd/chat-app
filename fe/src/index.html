<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>@ViewData["Title"] - ChatApp</title>
</head>
<body>
    <div class="container-fluid vh-100 d-flex flex-column p-0 overflow-hidden">

        <header class="border-bottom">
            <nav class="navbar navbar-expand-sm navbar-light bg-white box-shadow">
                <div class="container-fluid">
                    <a class="navbar-brand" asp-area="" asp-controller="Home" asp-action="Index">ChatApp</a>
                </div>
            </nav>
        </header>

        <main role="main" class="flex-grow-1 overflow-hidden">
          <app-root></app-root>
        </main>

        <footer class="border-top py-2 text-muted bg-white">
            <div class="container text-center">
                &copy; 2025 - ChatApp - <a href="/privacy">Privacy</a>
            </div>
        </footer>
    </div>
    <!-- <script src="~/js/site.js" asp-append-version="true"></script> -->
</body>
</html>
